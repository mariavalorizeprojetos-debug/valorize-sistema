<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --brand:#1C1C3A;--brand2:#2D2D5E;--accent:#4F6EF7;--accent2:#3B56E8;
  --bg:#F7F8FA;--surface:#FFFFFF;--surface2:#F2F3F7;
  --border:#E4E6ED;--border2:#CDD0DC;
  --text:#0F0F1A;--text2:#444560;--text3:#7B7D96;--text4:#A8AAC0;
  --green:#16A34A;--greenBg:#F0FDF4;
  --amber:#D97706;--amberBg:#FFFBEB;
  --red:#DC2626;--redBg:#FEF2F2;
  --blue:#2563EB;--blueBg:#EFF6FF;
  --indigo:#4F46E5;--indigoBg:#EEF2FF;
  --teal:#0D9488;--tealBg:#F0FDFA;
  --r4:4px;--r6:6px;--r8:8px;--r12:12px;
}
body{font-family:'Instrument Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.5}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
input,select,textarea,button{font-family:'Instrument Sans',sans-serif}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent)!important;box-shadow:0 0 0 3px rgba(79,110,247,.1)!important}
a{color:var(--accent);text-decoration:none}
a:hover{text-decoration:underline}

/* ── TOPBAR ── */
.topbar{height:56px;background:var(--brand);display:flex;align-items:center;padding:0 24px;position:fixed;top:0;left:0;right:0;z-index:200;gap:0}
.topbar-logo{display:flex;align-items:center;gap:10px;padding-right:32px;border-right:1px solid rgba(255,255,255,.12)}
.topbar-logo-mark{width:28px;height:28px;background:var(--accent);border-radius:6px;display:flex;align-items:center;justify-content:center}
.topbar-logo-text{font-size:13px;font-weight:700;color:#fff;letter-spacing:.2px}
.topbar-nav{display:flex;align-items:center;gap:2px;padding:0 20px;flex:1}
.tnav{height:56px;display:flex;align-items:center;padding:0 14px;font-size:13px;font-weight:500;color:rgba(255,255,255,.55);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap;gap:7px}
.tnav:hover{color:rgba(255,255,255,.85)}
.tnav.active{color:#fff;border-bottom-color:var(--accent)}
.tnav svg{flex-shrink:0}
.topbar-actions{display:flex;align-items:center;gap:8px;margin-left:auto}

/* ── SUBNAV ── */
.subnav{height:44px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 28px;gap:4px;position:fixed;top:56px;left:0;right:0;z-index:190}
.snav{height:44px;display:flex;align-items:center;padding:0 12px;font-size:12.5px;font-weight:500;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap}
.snav:hover{color:var(--text2)}
.snav.active{color:var(--accent);border-bottom-color:var(--accent)}

/* ── MAIN ── */
.main{margin-top:100px;padding:28px 32px;min-height:calc(100vh - 100px)}

/* ── COMPONENTS ── */
.card{background:var(--surface);border-radius:var(--r8);border:1px solid var(--border);margin-bottom:16px}
.card-pad{padding:20px 24px}
.card-hd{padding:16px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:12px}
.card-hd-title{font-size:14px;font-weight:600;color:var(--text)}
.card-ft{padding:12px 24px;border-top:1px solid var(--border);background:var(--bg);border-radius:0 0 var(--r8) var(--r8)}

.ph{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:22px;flex-wrap:wrap;gap:12px}
.pt{font-size:20px;font-weight:700;color:var(--text);letter-spacing:-.3px}
.ps{font-size:13px;color:var(--text3);margin-top:2px}

.btn{height:34px;padding:0 14px;border-radius:var(--r6);border:none;font-size:13px;font-weight:600;display:inline-flex;align-items:center;gap:6px;cursor:pointer;transition:all .12s;white-space:nowrap;letter-spacing:.1px}
.btn:active{transform:scale(.98)}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent2)}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border2)}
.btn-ghost:hover{background:var(--surface2);border-color:var(--border2)}
.btn-danger{background:var(--red);color:#fff}
.btn-danger:hover{opacity:.88}
.btn-sm{height:28px;padding:0 10px;font-size:12px}
.btn-icon{width:28px;height:28px;padding:0;justify-content:center}

.inp{height:34px;padding:0 10px;border-radius:var(--r6);border:1px solid var(--border2);font-size:13px;width:100%;color:var(--text);background:var(--surface);transition:.12s}
.inp:hover{border-color:var(--border2)}
.ta{padding:8px 10px;border-radius:var(--r6);border:1px solid var(--border2);font-size:13px;width:100%;color:var(--text);background:var(--surface);resize:vertical;min-height:72px;line-height:1.5}
.lbl{font-size:11px;font-weight:600;color:var(--text3);margin-bottom:5px;display:block;letter-spacing:.3px;text-transform:uppercase}
.sel{height:34px;padding:0 10px;border-radius:var(--r6);border:1px solid var(--border2);font-size:13px;width:100%;background:var(--surface);color:var(--text);cursor:pointer}

.frow{display:grid;gap:14px;margin-bottom:14px}
.f1{grid-template-columns:1fr}
.f2{grid-template-columns:1fr 1fr}
.f3{grid-template-columns:1fr 1fr 1fr}
.f4{grid-template-columns:1fr 1fr 1fr 1fr}

.sec-hd{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;padding-bottom:10px;margin-bottom:14px;border-bottom:1px solid var(--border)}

table{border-collapse:collapse;width:100%}
thead th{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;padding:10px 14px;background:var(--surface2);text-align:left;white-space:nowrap;border-bottom:1px solid var(--border)}
thead th:first-child{border-radius:var(--r6) 0 0 0}
thead th:last-child{border-radius:0 var(--r6) 0 0}
tbody td{padding:11px 14px;border-bottom:1px solid var(--border);font-size:13px;color:var(--text2);vertical-align:middle}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover td{background:var(--surface2)}
.ov{overflow-x:auto;border-radius:0 0 var(--r8) var(--r8)}

.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;letter-spacing:.2px;white-space:nowrap}
.bg{background:var(--greenBg);color:var(--green)}
.by{background:var(--amberBg);color:var(--amber)}
.br{background:var(--redBg);color:var(--red)}
.bb{background:var(--blueBg);color:var(--blue)}
.bi{background:var(--indigoBg);color:var(--indigo)}
.bt{background:var(--tealBg);color:var(--teal)}
.bn{background:var(--surface2);color:var(--text3)}

.krow{display:grid;gap:14px;margin-bottom:22px}
.krow-5{grid-template-columns:repeat(5,1fr)}
.krow-4{grid-template-columns:repeat(4,1fr)}
.kcard{background:var(--surface);border:1px solid var(--border);border-radius:var(--r8);padding:18px 20px}
.kcard-v{font-size:30px;font-weight:700;color:var(--text);letter-spacing:-.5px;margin-top:6px;line-height:1}
.kcard-l{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.5px}
.kcard-accent{border-top:3px solid}

.modal-ov{position:fixed;inset:0;background:rgba(15,15,26,.5);display:flex;align-items:flex-start;justify-content:center;z-index:500;padding:48px 16px;overflow-y:auto;backdrop-filter:blur(4px)}
.modal-box{background:var(--surface);border-radius:var(--r12);width:100%;max-width:960px;box-shadow:0 20px 60px rgba(0,0,0,.18),0 0 0 1px rgba(0,0,0,.06)}
.modal-hd{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-hd-title{font-size:15px;font-weight:700;color:var(--text)}
.modal-body{padding:24px}
.modal-ft{padding:16px 24px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;background:var(--bg);border-radius:0 0 var(--r12) var(--r12)}

.filters{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.sw{position:relative}
.sw .inp{padding-left:32px}
.sw-ic{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--text4);pointer-events:none;display:flex}

.toast{position:fixed;bottom:20px;right:20px;z-index:999;background:var(--surface);border-radius:var(--r8);padding:12px 16px;box-shadow:0 8px 24px rgba(0,0,0,.12),0 0 0 1px var(--border);display:flex;align-items:center;gap:10px;max-width:360px;font-size:13px;font-weight:500;color:var(--text)}

.tag-pat{display:inline-flex;align-items:center;background:var(--indigoBg);color:var(--indigo);border-radius:4px;font-size:11px;font-weight:600;padding:2px 7px;margin:1px}

.prazo-r{display:inline-flex;align-items:center;background:var(--redBg);color:var(--red);border-radius:4px;font-size:11px;font-weight:600;padding:2px 8px}
.prazo-y{display:inline-flex;align-items:center;background:var(--amberBg);color:var(--amber);border-radius:4px;font-size:11px;font-weight:600;padding:2px 8px}
.prazo-g{display:inline-flex;align-items:center;background:var(--greenBg);color:var(--green);border-radius:4px;font-size:11px;font-weight:600;padding:2px 8px}

.counter-strip{background:var(--surface);border:1px solid var(--border);border-radius:var(--r8);padding:16px 24px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between}
.counter-num{font-size:32px;font-weight:700;color:var(--accent);min-width:56px;text-align:center;border:2px solid var(--border);border-radius:var(--r6);padding:4px 12px;line-height:1.2}

.loading{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999}
.load-bar{width:180px;height:2px;background:var(--border);border-radius:1px;margin-top:20px;overflow:hidden}
.load-fill{height:100%;background:var(--accent);animation:ld 1.4s ease-in-out infinite}
@keyframes ld{0%{width:0;margin-left:0}50%{width:60%;margin-left:20%}100%{width:0;margin-left:180px}}

.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 24px;color:var(--text4)}
.empty-state svg{margin-bottom:12px;opacity:.4}
.empty-state p{font-size:13px}

.section-divider{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;padding:20px 0 10px;border-bottom:1px solid var(--border);margin-bottom:16px}

.pat-card{border:1px solid var(--border);border-radius:var(--r6);padding:12px 14px;margin-bottom:8px;background:var(--surface2)}

.alert-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:20px}
.alert-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r8);padding:16px 20px;border-left:3px solid}
.alert-card-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
.alert-card-count{font-size:28px;font-weight:700;margin-bottom:6px}
.chart-wrap{height:220px}
</style>
</head>

async function loadAll(){
  S.loading=true;render();
  const q=async(t,sel="*",order=null)=>{let q=sb.from(t).select(sel);if(order)q=q.order(order);const r=await q;return r.data||[];};
  try{
    const [p,pr,pat,pv,rel,ct,re,pc,el]=await Promise.all([
      q("projetos","*","nome"),
      q("proponentes","*","razao_social"),
      q("patrocinadores","*","empresa"),
      q("projeto_patrocinadores","*,patrocinadores(id,empresa,nome_contato,email,telefone,cnpj)"),
      q("relatorios_acompanhamento","*","data_prevista_envio"),
      q("contrapartidas"),
      q("reunioes_encerramento"),
      q("prestacao_contas"),
      q("elaboracao_projetos"),
    ]);
    Object.assign(S,{projetos:p,proponentes:pr,patrocinadores:pat,patVinculos:pv,relatorios:rel,contrapartidas:ct,reunioes:re,pc,elaboracao:el,loading:false});

  render();
}

async function upsert(table,data){
  const{id,...f}=data;
  const res=id?await sb.from(table).update(f).eq("id",id).select().single()
               :await sb.from(table).insert(f).select().single();
  if(res.error)throw res.error;
  return res.data;
}
async function delRow(table,id){const r=await sb.from(table).delete().eq("id",id);if(r.error)throw r.error;}

/* ── RENDER ENGINE ── */
function toast(msg,type="ok"){S.toast={msg,type};render();setTimeout(()=>{S.toast=null;render();},3400);}
function nav(tab,sub){S.tab=tab;S.sub=sub||tab;S.modal=null;render();}
function openModal(type,data={}){S.modal={type,data};render();}
function closeModal(){S.modal=null;render();}

function render(){
  const app=document.getElementById("app");
  if(S.loading){app.innerHTML=`<div class="loading"><div style="display:flex;align-items:center;gap:10px;margin-bottom:4px"><div style="width:24px;height:24px;background:var(--accent);border-radius:5px;display:flex;align-items:center;justify-content:center">${I.vp}</div><span style="font-size:15px;font-weight:700;color:var(--text)">Valorize Projetos</span></div><div style="font-size:12px;color:var(--text3)">Conectando ao banco de dados...</div><div class="load-bar"><div class="load-fill"></div></div></div>`;return;}
  app.innerHTML=topbar()+subnav()+`<div class="main">${page()}</div>`+modalHtml()+toastHtml();
  bindAll();
  if(S.sub==="rc_dashboard")setTimeout(initChart,50);
}

/* ── TOPBAR ── */
function topbar(){
  const tabs=[
    {id:"rc",label:"Relacionamento",icon:I.rc},
    {id:"projetos",label:"Projetos",icon:I.proj},
    {id:"pc",label:"Prestação de Contas",icon:I.pc},
    {id:"elab",label:"Elaboração",icon:I.elab},
  ];
  return`<div class="topbar">
    <div class="topbar-logo">
      <div class="topbar-logo-mark">${I.vp}</div>
      <span class="topbar-logo-text">Valorize</span>
    </div>
    <nav class="topbar-nav">
      ${tabs.map(t=>`<div class="tnav${S.tab===t.id?" active":""}" data-nav="${t.id}">${t.icon}<span>${t.label}</span></div>`).join("")}
    </nav>
  </div>`;
}

/* ── SUBNAV ── */
const subnavMap={
  rc:    [{id:"rc_dashboard",l:"Dashboard"},{id:"rc_relatorios",l:"Relatórios de Acompanhamento"},{id:"rc_contrapartidas",l:"Relatórios de Contrapartidas"},{id:"rc_reunioes",l:"Reuniões de Encerramento"}],
  projetos:[{id:"proj_lista",l:"Projetos"},{id:"proj_proponentes",l:"Proponentes"},{id:"proj_patrocinadores",l:"Patrocinadores"}],
  pc:    [{id:"pc_main",l:"Registros"},{id:"pc_prazos",l:"Prazos em Execução"}],
  elab:  [{id:"elab_main",l:"Projetos"}],
};
function subnav(){
  const items=subnavMap[S.tab]||[];
  return`<div class="subnav">${items.map(i=>`<div class="snav${S.sub===i.id?" active":""}" data-sub="${i.id}">${i.l}</div>`).join("")}</div>`;
}

/* ── PAGE ROUTER ── */
function page(){
  if(S.sub==="rc_dashboard")     return pgRcDash();
  if(S.sub==="rc_relatorios")    return pgRcRel();
  if(S.sub==="rc_contrapartidas")return pgRcCt();
  if(S.sub==="rc_reunioes")      return pgRcReun();
  if(S.sub==="proj_lista")       return pgProjLista();
  if(S.sub==="proj_proponentes") return pgProponentes();
  if(S.sub==="proj_patrocinadores") return pgPatrocinadores();
  if(S.sub==="pc_main")          return pgPC();
  if(S.sub==="pc_prazos")        return pgPrazos();
  if(S.sub==="elab_main")        return pgElab();
  return pgRcDash();
}

function kcard(label,value,color){
  return`<div class="kcard kcard-accent" style="border-top-color:${color}">
    <div class="kcard-l">${label}</div>
    <div class="kcard-v" style="color:${color}">${value}</div>
  </div>`;
}

function alertCard(title,count,color,sub){
  return`<div class="alert-card" style="border-left-color:${color};cursor:pointer" data-sub="${sub}">
    <div class="alert-card-title" style="color:${color}">${title}</div>
    <div class="alert-card-count" style="color:${color}">${count}</div>
    <div style="font-size:11px;color:var(--text3)">previstos em ${MESES[S.relMes]}</div>
  </div>`;
}

function initChart(){
  const canvas=document.getElementById("encChart");
  if(!canvas)return;
  if(S.chartInst){S.chartInst.destroy();S.chartInst=null;}
  const now=new Date();const labels=[],data=[];
  for(let i=-6;i<=18;i++){
    const d=new Date(now.getFullYear(),now.getMonth()+i,1);
    labels.push(["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"][d.getMonth()]+"/"+String(d.getFullYear()).slice(-2));
    data.push(S.projetos.filter(p=>{const e=p.data_prorrogacao||p.data_fim;if(!e)return false;const ed=new Date(e+"T12:00:00");return ed.getMonth()===d.getMonth()&&ed.getFullYear()===d.getFullYear();}).length);
  }
  S.chartInst=new Chart(canvas,{type:"line",data:{labels,datasets:[{label:"Encerramentos",data,fill:true,backgroundColor:"rgba(79,110,247,.06)",borderColor:"#4F6EF7",borderWidth:2,pointBackgroundColor:"#4F6EF7",pointRadius:3,tension:.4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,ticks:{stepSize:1,color:"#7B7D96",font:{family:"Instrument Sans",size:11}},grid:{color:"rgba(0,0,0,.04)"}},x:{ticks:{color:"#7B7D96",font:{family:"Instrument Sans",size:11},maxRotation:45},grid:{display:false}}}}});
}

function modalHtml(){
  if(!S.modal)return"";
  const{type,data}=S.modal;
  const projOpts=S.proponentes.map(p=>({v:p.id,l:p.razao_social}));
  const allProjOpts=S.projetos.map(p=>({v:p.id,l:p.nome}));
  const patGlobOpts=S.patrocinadores.map(p=>({v:p.id,l:p.empresa}));

  const f=(l,i)=>`<div><label class="lbl">${l}</label>${i}</div>`;
  const inp=(n,v,t="text",ph="")=>`<input class="inp" name="${n}" type="${t}" value="${esc(v||"")}" placeholder="${ph}">`;
  const selF=(n,v,opts,ph="Selecione...")=>`<select class="sel" name="${n}"><option value="">${ph}</option>${opts.map(o=>typeof o==="object"?`<option value="${esc(o.v)}"${v===o.v?" selected":""}>${esc(o.l)}</option>`:`<option value="${esc(o)}"${v===o?" selected":""}>${esc(o)}</option>`).join("")}</select>`;

  const r2=(...i)=>`<div class="frow f2">${i.join("")}</div>`;
  const r3=(...i)=>`<div class="frow f3">${i.join("")}</div>`;
  const r4=(...i)=>`<div class="frow f4">${i.join("")}</div>`;
  const sh=t=>`<div class="sec-hd">${t}</div>`;

  let title="", body="";

  if(type==="projeto"){
    title=data.id?"Editar Projeto":"Novo Projeto";
    body=`
      ${sh("Dados Gerais")}
      ${r2(f("Nome do Projeto *",inp("nome",data.nome,"text","Nome do projeto")),f("Proponente *",selF("proponente_id",data.proponente_id,projOpts)))}
      ${r4(f("Lei de Incentivo",selF("lei",data.lei,LEIS)),f("Ano de Início",inp("ano_inicio",data.ano_inicio,"number","2026")),f("Equipe PC",selF("equipe_pc",data.equipe_pc,EQUIPES)),f("Status",selF("status",data.status,STATUS_PROJ)))}
      ${r3(f("Estado",selF("estado",data.estado,ESTADOS,"UF")),f("Cidade",inp("cidade",data.cidade,"text","Cidade")),f("",`<div></div>`))}
      ${r3(f("Data de Início",inp("data_inicio",data.data_inicio,"date")),f("Data Fim",inp("data_fim",data.data_fim,"date")),f("Data de Prorrogação",inp("data_prorrogacao",data.data_prorrogacao,"date")))}
      ${f("Observações",ta("observacoes",data.observacoes))}`;
  }
  else if(type==="proponente"){
    title=data.id?"Editar Proponente":"Novo Proponente";
    body=`
      ${r2(f("Razão Social *",inp("razao_social",data.razao_social,"text","Nome da organização")),f("CNPJ",inp("cnpj",data.cnpj,"text","00.000.000/0001-00")))}
      ${r3(f("Estado",selF("estado",data.estado,ESTADOS,"UF")),f("Cidade",inp("cidade",data.cidade,"text","Cidade")),f("Telefone",inp("telefone",data.telefone,"tel","(00) 00000-0000")))}
      ${r2(f("Nome do Contato",inp("nome_contato",data.nome_contato,"text","Nome")),f("E-mail",inp("email",data.email,"email","email@exemplo.com")))}
      ${f("Observações",ta("observacoes",data.observacoes))}`;
  }
  else if(type==="patrocinador"){
    title=data.id?"Editar Patrocinador":"Novo Patrocinador";
    body=`
      <div style="background:var(--blueBg);border-radius:6px;padding:10px 14px;margin-bottom:16px;font-size:12px;color:var(--blue)">Este é o cadastro global do patrocinador. Após criá-lo, vincule-o aos projetos desejados na aba Projetos.</div>
      ${r2(f("Empresa *",inp("empresa",data.empresa,"text","Nome da empresa")),f("CNPJ",inp("cnpj",data.cnpj,"text","00.000.000/0001-00")))}
      ${r3(f("Nome do Contato",inp("nome_contato",data.nome_contato,"text","Nome")),f("E-mail",inp("email",data.email,"email","email@...")),f("Telefone",inp("telefone",data.telefone,"tel","(00) 00000-0000")))}
      ${f("Observações",ta("observacoes",data.observacoes))}`;
  }
  else if(type==="vincular-pat"){
    const proj=getProjObj(data.projeto_id);
    const vinsExist=vinculosDeProjeto(data.projeto_id);
    title="Adicionar Patrocinador ao Projeto";
    body=`

function toastHtml(){

function bindAll(){
  document.querySelectorAll("[data-nav]").forEach(e=>e.addEventListener("click",()=>{
    const t=e.dataset.nav;
    const subs=subnavMap[t];
    nav(t,subs?subs[0].id:t);
  }));
  document.querySelectorAll("[data-sub]").forEach(e=>e.addEventListener("click",()=>{S.sub=e.dataset.sub;S.modal=null;render();}));
  document.querySelectorAll("[data-close='true']").forEach(e=>e.addEventListener("click",ev=>{if(ev.target===e)closeModal();}));
  document.querySelectorAll("[data-action]").forEach(e=>e.addEventListener("click",()=>handleAction(e.dataset.action,e.dataset.id)));
  document.querySelectorAll("[data-bind]").forEach(e=>{
    const isNum=e.dataset.numtype==="int";
    const handler=()=>{S[e.dataset.bind]=isNum?parseInt(e.value):e.value;render();};
    e.addEventListener("input",handler);
    e.addEventListener("change",handler);
  });
  // Modal: atualizar patrocinadores ao mudar projeto (contrapartida)
  const ctProj=document.getElementById("ct_proj");
  if(ctProj){
    ctProj.addEventListener("change",()=>{
      const pid=ctProj.value;
      const ctPat=document.getElementById("ct_pat");
      if(!ctPat)return;
      const vins=pid?vinculosDeProjeto(pid):[];
      ctPat.innerHTML=`<option value="">— Sem patrocinador específico —</option>`+vins.map(v=>`<option value="${esc(v.id)}">${esc(patEmpresa(v))}</option>`).join("");
    });
  }
}

async function handleAction(action,id){
  if(action==="close-modal"){closeModal();return;}
  if(action==="novo-projeto"){openModal("projeto",{});return;}
  if(action==="novo-proponente"){openModal("proponente",{});return;}
  if(action==="novo-patrocinador"){openModal("patrocinador",{});return;}
  if(action==="novo-relatorio"){openModal("relatorio",{});return;}
  if(action==="nova-contrapartida"){openModal("contrapartida",{});return;}
  if(action==="nova-reuniao"){openModal("reuniao",{});return;}
  if(action==="novo-pc"){openModal("pc",{});return;}
  if(action==="nova-elaboracao"){openModal("elaboracao",{});return;}
  if(action==="add-patrocinador-projeto"){openModal("vincular-pat",{projeto_id:id});return;}

  if(action==="ver-projeto"){const d=S.projetos.find(p=>p.id===id);if(d)openModal("detalhe-projeto",d);return;}
  if(action==="edit-projeto"){const d=S.projetos.find(p=>p.id===id);if(d)openModal("projeto",{...d});return;}
  if(action==="edit-proponente"){const d=S.proponentes.find(p=>p.id===id);if(d)openModal("proponente",{...d});return;}
  if(action==="edit-patrocinador"){const d=S.patrocinadores.find(p=>p.id===id);if(d)openModal("patrocinador",{...d});return;}
  if(action==="edit-relatorio"){const d=S.relatorios.find(r=>r.id===id);if(d)openModal("relatorio",{...d});return;}
  if(action==="edit-contrapartida"){const d=S.contrapartidas.find(r=>r.id===id);if(d)openModal("contrapartida",{...d});return;}
  if(action==="edit-reuniao"){const d=S.reunioes.find(r=>r.id===id);if(d)openModal("reuniao",{...d});return;}
  if(action==="edit-pc"){const d=S.pc.find(r=>r.id===id);if(d)openModal("pc",{...d});return;}
  if(action==="edit-elaboracao"){
    const d=S.elaboracao.find(r=>r.id===id);
    if(d){const p=getProjObj(d.projeto_id);openModal("elaboracao",{...d,...(p?{nome:p.nome,lei:p.lei,estado:p.estado,cidade:p.cidade,proponente_id:p.proponente_id}:{})});}
    return;
  }

  const delActions={
    "del-relatorio":["relatorios_acompanhamento","relatorios"],
    "del-contrapartida":["contrapartidas","contrapartidas"],
    "del-reuniao":["reunioes_encerramento","reunioes"],
    "del-pc":["prestacao_contas","pc"],
    "del-elaboracao":["elaboracao_projetos","elaboracao"],
    "del-proponente":["proponentes","proponentes"],
    "del-patrocinador":["patrocinadores","patrocinadores"],
    "del-vinculo":["projeto_patrocinadores","patVinculos"],
  };
  if(delActions[action]){
    if(!confirm("Confirmar exclusão?"))return;
    const[table,key]=delActions[action];
    try{await delRow(table,id);S[key]=S[key].filter(r=>r.id!==id);toast("Excluído com sucesso.");render();}
    catch(e){toast("Erro: "+e.message,"err");}
    return;
  }
  if(action==="save-modal"){await saveModal();return;}
}

async function saveModal(){
  const form=document.getElementById("mf");
  if(!form)return;
  const fd=new FormData(form);
  const type=fd.get("_type"),id=fd.get("_id")||undefined;
  const g=k=>fd.get(k)||null;
  const gn=k=>{const v=fd.get(k);return v&&v!==""?parseFloat(v):null};
  const gi=k=>{const v=fd.get(k);return v&&v!==""?parseInt(v):null};
  try{
    if(type==="projeto"){
      if(!g("nome"))return toast("Informe o nome do projeto","err");
      const s=await upsert("projetos",{id,nome:g("nome"),proponente_id:g("proponente_id"),lei:g("lei"),ano_inicio:gi("ano_inicio"),estado:g("estado"),cidade:g("cidade"),status:g("status"),equipe_pc:g("equipe_pc"),data_inicio:g("data_inicio"),data_fim:g("data_fim"),data_prorrogacao:g("data_prorrogacao"),observacoes:g("observacoes")});
      S.projetos=id?S.projetos.map(p=>p.id===id?s:p):[...S.projetos,s];
      closeModal();toast(id?"Projeto atualizado!":"Projeto cadastrado!");
    }
    else if(type==="proponente"){
      if(!g("razao_social"))return toast("Informe a razão social","err");
      const s=await upsert("proponentes",{id,razao_social:g("razao_social"),cnpj:g("cnpj"),estado:g("estado"),cidade:g("cidade"),nome_contato:g("nome_contato"),email:g("email"),telefone:g("telefone"),observacoes:g("observacoes")});
      S.proponentes=id?S.proponentes.map(p=>p.id===id?s:p):[...S.proponentes,s];
      closeModal();toast(id?"Proponente atualizado!":"Proponente cadastrado!");
    }
    else if(type==="patrocinador"){
      if(!g("empresa"))return toast("Informe o nome da empresa","err");
      const s=await upsert("patrocinadores",{id,empresa:g("empresa"),cnpj:g("cnpj"),nome_contato:g("nome_contato"),email:g("email"),telefone:g("telefone"),observacoes:g("observacoes")});
      S.patrocinadores=id?S.patrocinadores.map(p=>p.id===id?s:p):[...S.patrocinadores,s];
      closeModal();toast(id?"Patrocinador atualizado!":"Patrocinador cadastrado!");
    }
    else if(type==="vincular-pat"){
      const projId=g("projeto_id");
      const patId=g("patrocinador_id");
      if(!patId)return toast("Selecione um patrocinador","err");
      const already=S.patVinculos.find(v=>v.projeto_id===projId&&v.patrocinador_id===patId);
      if(already)return toast("Este patrocinador já está vinculado a este projeto","err");
      const res=await sb.from("projeto_patrocinadores").insert({projeto_id:projId,patrocinador_id:patId,tipo_incentivo:g("tipo_incentivo"),tipo_contrato:g("tipo_contrato"),valor_patrocinio:gn("valor_patrocinio"),tipo_monitoramento:g("tipo_monitoramento"),link_monitoramento:g("link_monitoramento"),login_monitoramento:g("login_monitoramento"),senha_monitoramento:g("senha_monitoramento")}).select("*,patrocinadores(id,empresa,nome_contato,email,telefone,cnpj)").single();
      if(res.error)throw res.error;
      S.patVinculos=[...S.patVinculos,res.data];
      closeModal();toast("Patrocinador vinculado!");
    }
    else if(type==="relatorio"){
      if(!g("projeto_id"))return toast("Selecione o projeto","err");
      const s=await upsert("relatorios_acompanhamento",{id,projeto_id:g("projeto_id"),numero_relatorio:gi("numero_relatorio"),mes_referencia:g("mes_referencia"),data_prevista_envio:g("data_prevista_envio"),data_envio:g("data_envio"),status:g("status")||"Previsto",observacoes:g("observacoes")});
      S.relatorios=id?S.relatorios.map(r=>r.id===id?s:r):[...S.relatorios,s];
      closeModal();toast("Relatório salvo!");
    }
    else if(type==="contrapartida"){
      if(!g("projeto_id"))return toast("Selecione o projeto","err");
      if(!g("descricao"))return toast("Informe a descrição","err");
      const s=await upsert("contrapartidas",{id,projeto_id:g("projeto_id"),patrocinador_vinculo_id:g("patrocinador_vinculo_id"),descricao:g("descricao"),data_prevista:g("data_prevista"),status:g("status")||"Aguardando",link_relatorio:g("link_relatorio"),observacoes:g("observacoes")});
      S.contrapartidas=id?S.contrapartidas.map(r=>r.id===id?s:r):[...S.contrapartidas,s];
      closeModal();toast("Contrapartida salva!");
    }
    else if(type==="reuniao"){
      if(!g("projeto_id"))return toast("Selecione o projeto","err");
      const s=await upsert("reunioes_encerramento",{id,projeto_id:g("projeto_id"),nome_contato:g("nome_contato"),contato:g("contato"),status:g("status")||"Agendar",data_agendamento:g("data_agendamento"),observacoes:g("observacoes")});
      S.reunioes=id?S.reunioes.map(r=>r.id===id?s:r):[...S.reunioes,s];
      closeModal();toast("Reunião salva!");
    }
    else if(type==="pc"){
      if(!g("projeto_id"))return toast("Selecione o projeto","err");
      const existing=S.pc.find(p=>p.projeto_id===g("projeto_id")&&!id);
      const useId=id||(existing&&existing.id)||undefined;
      const s=await upsert("prestacao_contas",{id:useId,projeto_id:g("projeto_id"),mes_inicio:g("mes_inicio"),status_ato:g("status_ato"),status_plano_divulgacao:g("status_plano_divulgacao"),confirmacao_patrocinio:g("confirmacao_patrocinio"),obs_confirmacao:g("obs_confirmacao"),valor_projeto:gn("valor_projeto"),valor_captado:gn("valor_captado"),prazo_envio:g("prazo_envio"),prazo_aditivo:g("prazo_aditivo"),prazo_sem_aditivo:g("prazo_sem_aditivo"),observacoes:g("observacoes")});
      S.pc=useId?S.pc.map(p=>p.id===s.id?s:p):[...S.pc,s];
      closeModal();toast("PC salvo!");
    }
    else if(type==="elaboracao"){
      let projId=g("projeto_id");
      if(!projId){
        const existente=g("projeto_id_existente");
        if(existente){projId=existente;}
        else{
          if(!g("nome"))return toast("Informe o nome do projeto ou selecione um existente","err");
          const pSaved=await upsert("projetos",{nome:g("nome"),proponente_id:g("proponente_id"),lei:g("lei"),estado:g("estado"),cidade:g("cidade"),status:"Em captação"});
          S.projetos=[...S.projetos,pSaved];
          projId=pSaved.id;
        }
      }
      const s=await upsert("elaboracao_projetos",{id,projeto_id:projId,manifestacao:g("manifestacao"),tipo_novo_renovacao:g("tipo_novo_renovacao"),tipo_pago_cortesia:g("tipo_pago_cortesia"),numero_sli:g("numero_sli"),status_elaboracao:g("status_elaboracao"),data_envio_ministerio:g("data_envio_ministerio"),data_aprovacao_reuniao:g("data_aprovacao_reuniao"),data_publicacao_dou:g("data_publicacao_dou"),periodo_final_captacao:g("periodo_final_captacao"),inicio_execucao:g("inicio_execucao"),valor_autorizado_captacao:gn("valor_autorizado_captacao"),valor_total_captado:gn("valor_total_captado"),valor_faturamento:gn("valor_faturamento"),percentual_captado:gn("percentual_captado"),valor_prestacao_contas:gn("valor_prestacao_contas"),nome_contato:g("nome_contato"),email_contato:g("email_contato"),tel_contato:g("tel_contato"),observacoes:g("observacoes")});
      S.elaboracao=id?S.elaboracao.map(e=>e.id===id?s:e):[...S.elaboracao,s];
      closeModal();toast("Elaboração salva!");
    }
  }catch(e){toast("Erro: "+e.message,"err");}
}

// ── INIT ──
render();
loadAll();
</script>
