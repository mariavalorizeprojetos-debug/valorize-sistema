<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Valorize Projetos</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  /* ── LIGHT MODE ── */
  --brand:#2D2878;--brand2:#231E6E;--accent:#4F3CC9;--accent2:#3D2DB0;
  --bg:#EDEEF3;--surface:#FFFFFF;--surface2:#E8E9F0;
  --border:#D0D2DE;--border2:#B8BBCC;
  --text:#0A0A18;--text2:#2E2E50;--text3:#5C5E7A;--text4:#9092A8;
  --green:#14803C;--greenBg:#DCFCE7;
  --amber:#B45309;--amberBg:#FEF3C7;
  --red:#B91C1C;--redBg:#FEE2E2;
  --blue:#1D4ED8;--blueBg:#DBEAFE;
  --indigo:#3730A3;--indigoBg:#E0E7FF;
  --teal:#0F766E;--tealBg:#CCFBF1;
  --r4:4px;--r6:6px;--r8:8px;--r12:12px;
}
[data-theme="dark"]{
  /* ── DARK MODE — fundos escuros, textos brancos ── */
  --brand:#231E6E;--brand2:#1A1560;--accent:#7C6FF7;--accent2:#6A5DE8;
  --bg:#0C0C14;--surface:#13131F;--surface2:#1C1C2E;
  --border:#282840;--border2:#333350;
  --text:#FFFFFF;--text2:#E0E0F0;--text3:#9898B8;--text4:#606078;
  --green:#86EFAC;--greenBg:#052e16;
  --amber:#FDE68A;--amberBg:#1c1003;
  --red:#FCA5A5;--redBg:#1f0808;
  --blue:#93C5FD;--blueBg:#0c1a30;
  --indigo:#C4B5FD;--indigoBg:#13103a;
  --teal:#5EEAD4;--tealBg:#021a18;
}
/* ── DARK: forçar branco em todos os textos de conteúdo ── */
[data-theme="dark"] *{color:inherit}
[data-theme="dark"] body{color:#FFFFFF}
[data-theme="dark"] .pt{color:#FFFFFF}
[data-theme="dark"] .ps{color:#9898B8}
[data-theme="dark"] .card-hd-title{color:#FFFFFF}
[data-theme="dark"] .lbl{color:#9898B8}
[data-theme="dark"] .sec-hd{color:#9898B8;border-bottom-color:#282840}
[data-theme="dark"] thead th{color:#9898B8;background:#1C1C2E;border-bottom-color:#282840}
[data-theme="dark"] tbody td{color:#E0E0F0;border-bottom-color:#282840}
[data-theme="dark"] tbody tr:hover td{background:#1C1C2E}
[data-theme="dark"] .inp,[data-theme="dark"] .sel,[data-theme="dark"] .ta{color:#FFFFFF;background:#13131F;border-color:#333350}
[data-theme="dark"] .inp::placeholder,[data-theme="dark"] .ta::placeholder{color:#606078}
[data-theme="dark"] .btn-ghost{color:#E0E0F0;border-color:#333350;background:transparent}
[data-theme="dark"] .btn-ghost:hover{background:#1C1C2E}
[data-theme="dark"] .snav{color:#9898B8}
[data-theme="dark"] .snav:hover{color:#E0E0F0}
[data-theme="dark"] .snav.active{color:#C4B5FD;border-bottom-color:#C4B5FD}
[data-theme="dark"] .subnav{background:#13131F;border-bottom-color:#282840}
[data-theme="dark"] .kcard-l{color:#9898B8}
[data-theme="dark"] .kcard-v{color:inherit}
[data-theme="dark"] .kcard{background:#13131F;border-color:#282840}
[data-theme="dark"] .card{background:#13131F;border-color:#282840}
[data-theme="dark"] .card-hd{border-bottom-color:#282840}
[data-theme="dark"] .modal-box{background:#13131F;border-color:#282840;box-shadow:0 24px 60px rgba(0,0,0,.7)}
[data-theme="dark"] .modal-ft{background:#1C1C2E;border-top-color:#282840}
[data-theme="dark"] .modal-hd{border-bottom-color:#282840}
[data-theme="dark"] .modal-hd-title{color:#FFFFFF}
[data-theme="dark"] .counter-strip{background:#13131F;border-color:#282840}
[data-theme="dark"] .counter-num{border-color:#333350}
[data-theme="dark"] .alert-card{background:#13131F;border-color:#282840}
[data-theme="dark"] .empty-state{color:#606078}
[data-theme="dark"] .tag-pat{background:#13103a;color:#C4B5FD}
[data-theme="dark"] .prazo-r{background:#1f0808;color:#FCA5A5}
[data-theme="dark"] .prazo-y{background:#1c1003;color:#FDE68A}
[data-theme="dark"] .prazo-g{background:#052e16;color:#86EFAC}
[data-theme="dark"] .bg{background:#052e16;color:#86EFAC}
[data-theme="dark"] .by{background:#1c1003;color:#FDE68A}
[data-theme="dark"] .br{background:#1f0808;color:#FCA5A5}
[data-theme="dark"] .bb{background:#0c1a30;color:#93C5FD}
[data-theme="dark"] .bi{background:#13103a;color:#C4B5FD}
[data-theme="dark"] .bt{background:#021a18;color:#5EEAD4}
[data-theme="dark"] .bn{background:#1C1C2E;color:#9898B8}
[data-theme="dark"] .toast{background:#13131F;border-color:#282840;color:#FFFFFF}
[data-theme="dark"] .field-wrap .lbl{color:#9898B8}
body{font-family:'Instrument Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.5;transition:background .2s,color .2s}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
input,select,textarea,button{font-family:'Instrument Sans',sans-serif}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent)!important;box-shadow:0 0 0 3px rgba(108,92,231,.15)!important}
a{color:var(--accent)}

/* ── LOGIN ── */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--brand2)}
.login-bg{position:fixed;inset:0;background:linear-gradient(135deg,var(--brand2) 0%,#1a1545 50%,#0d0d26 100%);z-index:0}
.login-card{position:relative;z-index:1;background:rgba(255,255,255,.06);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.12);border-radius:16px;padding:48px 44px;width:100%;max-width:420px;box-shadow:0 32px 80px rgba(0,0,0,.5)}
.login-logo{display:flex;align-items:center;gap:12px;margin-bottom:36px;justify-content:center}
.login-logo-mark{width:44px;height:44px;background:var(--accent);border-radius:10px;display:flex;align-items:center;justify-content:center}
.login-logo-name{font-size:22px;font-weight:700;color:#fff;letter-spacing:-.3px}
.login-title{font-size:18px;font-weight:700;color:#fff;margin-bottom:6px;text-align:center}
.login-sub{font-size:13px;color:rgba(255,255,255,.5);text-align:center;margin-bottom:28px}
.login-field{margin-bottom:16px}
.login-field label{font-size:11px;font-weight:600;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:6px}
.login-field input{width:100%;height:42px;padding:0 14px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:8px;font-size:14px;color:#fff;transition:.15s}
.login-field input:focus{background:rgba(255,255,255,.12);border-color:var(--accent);box-shadow:0 0 0 3px rgba(108,92,231,.25);outline:none}
.login-field input::placeholder{color:rgba(255,255,255,.3)}
.login-btn{width:100%;height:44px;background:var(--accent);border:none;border-radius:8px;font-size:14px;font-weight:700;color:#fff;cursor:pointer;transition:.15s;margin-top:8px;letter-spacing:.2px}
.login-btn:hover{background:var(--accent2)}
.login-err{background:rgba(220,38,38,.15);border:1px solid rgba(220,38,38,.4);border-radius:6px;padding:10px 14px;font-size:13px;color:#fca5a5;margin-bottom:14px;display:none}

/* ── TOPBAR ── */
.topbar{height:54px;background:var(--brand2);display:flex;align-items:center;padding:0 24px;position:fixed;top:0;left:0;right:0;z-index:200;gap:0;border-bottom:1px solid rgba(255,255,255,.08)}
.topbar-logo{display:flex;align-items:center;gap:10px;padding-right:28px;border-right:1px solid rgba(255,255,255,.12)}
.topbar-logo-mark{width:26px;height:26px;background:var(--accent);border-radius:6px;display:flex;align-items:center;justify-content:center}
.topbar-logo-text{font-size:13px;font-weight:700;color:#fff}
.topbar-nav{display:flex;align-items:center;gap:2px;padding:0 20px;flex:1}
.tnav{height:54px;display:flex;align-items:center;padding:0 14px;font-size:13px;font-weight:500;color:rgba(255,255,255,.5);cursor:pointer;border-bottom:2px solid transparent;transition:.15s;gap:7px;white-space:nowrap}
.tnav:hover{color:rgba(255,255,255,.85)}
.tnav.active{color:#fff;border-bottom-color:var(--accent)}
.topbar-right{display:flex;align-items:center;gap:8px;margin-left:auto}
.user-pill{display:flex;align-items:center;gap:8px;padding:4px 12px;background:rgba(255,255,255,.08);border-radius:20px;font-size:12px;color:rgba(255,255,255,.7);cursor:pointer}
.user-pill:hover{background:rgba(255,255,255,.14)}
.dark-toggle{width:30px;height:30px;background:rgba(255,255,255,.08);border:none;border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.6);transition:.15s}
.dark-toggle:hover{background:rgba(255,255,255,.15);color:#fff}

/* ── SUBNAV ── */
.subnav{height:42px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 28px;gap:4px;position:fixed;top:54px;left:0;right:0;z-index:190}
.snav{height:42px;display:flex;align-items:center;padding:0 12px;font-size:12.5px;font-weight:500;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;transition:.15s;white-space:nowrap}
.snav:hover{color:var(--text2)}
.snav.active{color:var(--accent);border-bottom-color:var(--accent)}

/* ── MAIN ── */
.main{margin-top:96px;padding:28px 32px;min-height:calc(100vh - 96px)}

/* ── COMPONENTS ── */
.card{background:var(--surface);border-radius:var(--r8);border:1px solid var(--border);margin-bottom:16px}
.card-pad{padding:20px 24px}
.card-hd{padding:14px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:12px}
.card-hd-title{font-size:13px;font-weight:700;color:var(--text)}
.ph{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px;flex-wrap:wrap;gap:12px}
.pt{font-size:20px;font-weight:700;color:var(--text);letter-spacing:-.3px}
.ps{font-size:13px;color:var(--text3);margin-top:2px}
.btn{height:34px;padding:0 14px;border-radius:var(--r6);border:none;font-size:13px;font-weight:600;display:inline-flex;align-items:center;gap:6px;cursor:pointer;transition:.12s;white-space:nowrap}
.btn:active{transform:scale(.98)}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent2)}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border2)}
.btn-ghost:hover{background:var(--surface2)}
.btn-danger{background:var(--red);color:#fff}
.btn-sm{height:28px;padding:0 10px;font-size:12px}
.btn-icon{width:28px;height:28px;padding:0;justify-content:center}
.inp{height:34px;padding:0 10px;border-radius:var(--r6);border:1px solid var(--border2);font-size:13px;width:100%;color:var(--text);background:var(--surface);transition:.12s}
.inp.err{border-color:var(--red)!important}
.inp-err{font-size:11px;color:var(--red);margin-top:3px;display:none}
.ta{padding:8px 10px;border-radius:var(--r6);border:1px solid var(--border2);font-size:13px;width:100%;color:var(--text);background:var(--surface);resize:vertical;min-height:72px}
.lbl{font-size:11px;font-weight:600;color:var(--text3);margin-bottom:5px;display:block;letter-spacing:.3px;text-transform:uppercase}
.sel{height:34px;padding:0 10px;border-radius:var(--r6);border:1px solid var(--border2);font-size:13px;width:100%;background:var(--surface);color:var(--text);cursor:pointer}
.frow{display:grid;gap:14px;margin-bottom:14px}
.f2{grid-template-columns:1fr 1fr}
.f3{grid-template-columns:1fr 1fr 1fr}
.f4{grid-template-columns:1fr 1fr 1fr 1fr}
.sec-hd{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;padding-bottom:8px;margin-bottom:14px;border-bottom:1px solid var(--border)}
table{border-collapse:collapse;width:100%}
thead th{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;padding:10px 14px;background:var(--surface2);text-align:left;white-space:nowrap;border-bottom:1px solid var(--border)}
tbody td{padding:10px 14px;border-bottom:1px solid var(--border);font-size:13px;color:var(--text2);vertical-align:middle}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover td{background:var(--surface2)}
.ov{overflow-x:auto}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;letter-spacing:.2px;white-space:nowrap}
.bg{background:var(--greenBg);color:var(--green)}
.by{background:var(--amberBg);color:var(--amber)}
.br{background:var(--redBg);color:var(--red)}
.bb{background:var(--blueBg);color:var(--blue)}
.bi{background:var(--indigoBg);color:var(--indigo)}
.bt{background:var(--tealBg);color:var(--teal)}
.bn{background:var(--surface2);color:var(--text3)}
.krow{display:grid;gap:14px;margin-bottom:20px}
.krow-5{grid-template-columns:repeat(5,1fr)}
.krow-4{grid-template-columns:repeat(4,1fr)}
.kcard{background:var(--surface);border:1px solid var(--border);border-radius:var(--r8);padding:16px 20px;border-top:3px solid}
.kcard-v{font-size:28px;font-weight:700;letter-spacing:-.5px;margin-top:5px;line-height:1}
.kcard-l{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px}
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:flex-start;justify-content:center;z-index:500;padding:44px 16px;overflow-y:auto;backdrop-filter:blur(4px)}
.modal-box{background:var(--surface);border-radius:var(--r12);width:100%;max-width:960px;box-shadow:0 24px 60px rgba(0,0,0,.25),0 0 0 1px var(--border)}
.modal-hd{padding:18px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-hd-title{font-size:15px;font-weight:700;color:var(--text)}
.modal-body{padding:24px}
.modal-ft{padding:14px 24px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;background:var(--surface2);border-radius:0 0 var(--r12) var(--r12)}
.filters{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.filter-bar{background:var(--surface);border:1px solid var(--border);border-radius:var(--r8);padding:14px 18px;margin-bottom:14px;display:flex;flex-wrap:wrap;gap:10px;align-items:flex-end}
.filter-bar .f-group{display:flex;flex-direction:column;gap:4px;min-width:140px}
.filter-bar .f-group label{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.4px}
.filter-bar .f-group .inp,.filter-bar .f-group .sel{height:32px;font-size:12px}
.filter-bar .f-group.wide{min-width:220px}
.filter-active{display:inline-flex;align-items:center;gap:4px;background:var(--indigoBg);color:var(--indigo);border-radius:4px;font-size:11px;font-weight:600;padding:3px 8px;margin:2px}
.filter-count{display:inline-flex;align-items:center;justify-content:center;background:var(--accent);color:#fff;border-radius:10px;font-size:10px;font-weight:700;padding:1px 6px;margin-left:6px;min-width:18px}
[data-theme="dark"] .filter-bar{background:var(--surface);border-color:var(--border)}
[data-theme="dark"] .filter-active{background:var(--indigoBg);color:var(--indigo)}
.sw{position:relative}
.sw .inp{padding-left:32px}
.sw-ic{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--text4);display:flex;pointer-events:none}
.toast{position:fixed;bottom:20px;right:20px;z-index:9999;background:var(--surface);border-radius:var(--r8);padding:12px 16px;box-shadow:0 8px 24px rgba(0,0,0,.18),0 0 0 1px var(--border);display:flex;align-items:center;gap:10px;max-width:360px;font-size:13px;font-weight:500;color:var(--text);animation:slideIn .2s ease}
@keyframes slideIn{from{transform:translateY(8px);opacity:0}to{transform:translateY(0);opacity:1}}
.tag-pat{display:inline-flex;align-items:center;background:var(--indigoBg);color:var(--indigo);border-radius:4px;font-size:11px;font-weight:600;padding:2px 7px;margin:1px}
.prazo-r{display:inline-flex;align-items:center;background:var(--redBg);color:var(--red);border-radius:4px;font-size:11px;font-weight:600;padding:2px 8px}
.prazo-y{display:inline-flex;align-items:center;background:var(--amberBg);color:var(--amber);border-radius:4px;font-size:11px;font-weight:600;padding:2px 8px}
.prazo-g{display:inline-flex;align-items:center;background:var(--greenBg);color:var(--green);border-radius:4px;font-size:11px;font-weight:600;padding:2px 8px}
.counter-strip{background:var(--surface);border:1px solid var(--border);border-radius:var(--r8);padding:14px 22px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between}
.counter-num{font-size:30px;font-weight:700;color:var(--accent);min-width:54px;text-align:center;border:2px solid var(--border);border-radius:var(--r6);padding:4px 14px;line-height:1.2}
.alert-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:18px}
.alert-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r8);padding:16px 20px;border-left:3px solid;cursor:pointer;transition:.15s}
.alert-card:hover{box-shadow:0 4px 12px rgba(0,0,0,.1)}
.chart-wrap{height:210px}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 24px;color:var(--text4)}
.empty-state p{font-size:13px;margin-top:10px}
.rt-dot{width:6px;height:6px;background:#22c55e;border-radius:50%;display:inline-block;animation:pulse 2s infinite;margin-right:4px}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* LOADING */
.loading{position:fixed;inset:0;background:var(--brand2);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999}
.loading-logo{width:52px;height:52px;background:var(--accent);border-radius:14px;display:flex;align-items:center;justify-content:center;margin-bottom:16px;animation:logoPop .4s ease}
@keyframes logoPop{from{transform:scale(.8);opacity:0}to{transform:scale(1);opacity:1}}
.loading-text{font-size:18px;font-weight:700;color:#fff;margin-bottom:4px}
.loading-sub{font-size:12px;color:rgba(255,255,255,.4);margin-bottom:20px}
.load-bar{width:160px;height:2px;background:rgba(255,255,255,.15);border-radius:1px;overflow:hidden}
.load-fill{height:100%;background:var(--accent);animation:ld 1.4s ease-in-out infinite}
@keyframes ld{0%{width:0;margin-left:0}50%{width:60%;margin-left:20%}100%{width:0;margin-left:160px}}

/* VALIDATION */
.field-wrap{position:relative}
.field-wrap .inp.err,.field-wrap .sel.err{border-color:var(--red)!important}
.field-err{font-size:11px;color:var(--red);margin-top:3px;display:block}
</style>
</head>

/* ── VALIDAÇÕES ── */
function validarCNPJ(cnpj){
  cnpj=cnpj.replace(/[^\d]/g,"");
  if(cnpj.length!==14)return false;
  if(/^(\d)\1+$/.test(cnpj))return false;
  let sum=0,rem;
  for(let i=1;i<=12;i++)sum+=parseInt(cnpj[i-1])*(i<9?i+1:i-7);
  rem=sum%11;
  if(rem<2){if(parseInt(cnpj[12])!==0)return false;}
  else{if(parseInt(cnpj[12])!==11-rem)return false;}
  sum=0;
  for(let i=1;i<=13;i++)sum+=parseInt(cnpj[i-1])*(i<10?i+1:i-7);
  rem=sum%11;
  if(rem<2){if(parseInt(cnpj[13])!==0)return false;}
  else{if(parseInt(cnpj[13])!==11-rem)return false;}
  return true;
}

function validarData(s){
  if(!s)return true; // vazio é ok
  const d=new Date(s+"T12:00:00");
  if(isNaN(d))return false;
  if(d.getFullYear()<2000||d.getFullYear()>2040)return false;
  return true;
}

function verificaDuplicidade(lista,campo,valor,idAtual){
  return lista.some(item=>item[campo]&&item[campo].trim().toLowerCase()===valor.trim().toLowerCase()&&item.id!==idAtual);
}

async function loadAll(){
  const q=async(t,sel,ord)=>{let r=sb.from(t).select(sel||"*");if(ord)r=r.order(ord);const res=await r;return res.data||[]};
  const[p,pr,pat,pv,rel,ct,re,pc,el]=await Promise.all([
    q("projetos","*","nome"),q("proponentes","*","razao_social"),
    q("patrocinadores","*","empresa"),
    q("projeto_patrocinadores","*,patrocinadores(id,empresa,nome_contato,email,telefone,cnpj)"),
    q("relatorios_acompanhamento","*","data_prevista_envio"),
    q("contrapartidas"),q("reunioes_encerramento"),
    q("prestacao_contas"),q("elaboracao_projetos"),
  ]);
  Object.assign(S,{projetos:p,proponentes:pr,patrocinadores:pat,patVinculos:pv,relatorios:rel,contrapartidas:ct,reunioes:re,pc,elaboracao:el});
}

async function upsert(table,data){
  const{id,...f}=data;
  const res=id?await sb.from(table).update(f).eq("id",id).select().single()
               :await sb.from(table).insert(f).select().single();
  if(res.error)throw res.error;
  return res.data;
}
async function delRow(table,id){const r=await sb.from(table).delete().eq("id",id);if(r.error)throw r.error;}

/* ── REALTIME ── */
function setupRealtime(){
  if(S.realtimeCh)sb.removeChannel(S.realtimeCh);
  const tables=["projetos","proponentes","patrocinadores","projeto_patrocinadores","relatorios_acompanhamento","contrapartidas","reunioes_encerramento","prestacao_contas","elaboracao_projetos"];
  const ch=sb.channel("valorize_realtime");
  tables.forEach(t=>{
    ch.on("postgres_changes",{event:"*",schema:"public",table:t},async()=>{
      await reloadTable(t);
      render();
    });
  });
  ch.subscribe();
  S.realtimeCh=ch;
}

async function reloadTable(t){
  const q=async(sel,ord)=>{let r=sb.from(t).select(sel||"*");if(ord)r=r.order(ord);const res=await r;return res.data||[]};
  const map={
    projetos:async()=>{S.projetos=await q("*","nome")},
    proponentes:async()=>{S.proponentes=await q("*","razao_social")},
    patrocinadores:async()=>{S.patrocinadores=await q("*","empresa")},
    projeto_patrocinadores:async()=>{S.patVinculos=await q("*,patrocinadores(id,empresa,nome_contato,email,telefone,cnpj)")},
    relatorios_acompanhamento:async()=>{S.relatorios=await q("*","data_prevista_envio")},
    contrapartidas:async()=>{S.contrapartidas=await q()},
    reunioes_encerramento:async()=>{S.reunioes=await q()},
    prestacao_contas:async()=>{S.pc=await q()},
    elaboracao_projetos:async()=>{S.elaboracao=await q()},
  };
  if(map[t])await map[t]();
}

function doLogin(email,senha){
  const u=USERS[email.toLowerCase()];
  if(!u||u.senha!==senha)return false;
  S.user={email,setor:u.setor,tab:u.tab};
  S.tab=u.tab;S.sub=subnavMap[u.tab]?.[0]?.id||u.tab;
  localStorage.setItem("vp_user",JSON.stringify(S.user));
  return true;
}
function doLogout(){
  S.user=null;localStorage.removeItem("vp_user");
  S.page="login";render();
}

  if(S.page==="loading"){
    app.innerHTML=`<div class="loading">
      <div class="loading-logo">${I.vp}</div>

      <div class="loading-sub">Conectando ao sistema...</div>

function bindLogin(){
  const btn=document.getElementById("login-btn");
  const err=document.getElementById("login-err");
  const tryLogin=()=>{
    const email=document.getElementById("li-email")?.value||"";
    const senha=document.getElementById("li-senha")?.value||"";
    if(doLogin(email,senha)){
      S.page="app";render();
    }else{
      if(err)err.style.display="block";
    }
  };
  if(btn)btn.addEventListener("click",tryLogin);
  document.getElementById("li-senha")?.addEventListener("keydown",e=>{if(e.key==="Enter")tryLogin();});
  document.getElementById("li-email")?.addEventListener("keydown",e=>{if(e.key==="Enter")document.getElementById("li-senha")?.focus();});
}

function initChart(){
  const canvas=document.getElementById("encChart");if(!canvas)return;
  if(S.chartInst){S.chartInst.destroy();S.chartInst=null;}
  const now=new Date();const labels=[],data=[];
  for(let i=-6;i<=18;i++){
    const d=new Date(now.getFullYear(),now.getMonth()+i,1);
    labels.push(["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"][d.getMonth()]+"/"+String(d.getFullYear()).slice(-2));
    data.push(S.projetos.filter(p=>{const e=p.data_prorrogacao||p.data_fim;if(!e)return false;const ed=new Date(e+"T12:00:00");return ed.getMonth()===d.getMonth()&&ed.getFullYear()===d.getFullYear();}).length);
  }
  const isDark=S.dark;
  const gridColor=isDark?"rgba(255,255,255,.05)":"rgba(0,0,0,.04)";
  const tickColor=isDark?"#505075":"#7B7D96";
  S.chartInst=new Chart(canvas,{type:"line",data:{labels,datasets:[{label:"Encerramentos",data,fill:true,backgroundColor:isDark?"rgba(108,92,231,.1)":"rgba(108,92,231,.06)",borderColor:"#6C5CE7",borderWidth:2,pointBackgroundColor:"#6C5CE7",pointRadius:3,tension:.4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,ticks:{stepSize:1,color:tickColor,font:{family:"Instrument Sans",size:11}},grid:{color:gridColor}},x:{ticks:{color:tickColor,font:{family:"Instrument Sans",size:11},maxRotation:45},grid:{display:false}}}}});
}

function tblWrap(headers,rows){

  if(!body)return"";
  return`<div class="modal-ov" data-close="true"><div class="modal-box">
    <div class="modal-hd"><span class="modal-hd-title">${title}</span><button class="btn btn-ghost btn-sm btn-icon" data-action="close-modal">${I.x}</button></div>
    <div class="modal-body"><form id="mf">${body}<input type="hidden" name="_id" value="${data.id||""}"><input type="hidden" name="_type" value="${type}"></form></div>
    <div class="modal-ft"><button class="btn btn-ghost" data-action="close-modal">Cancelar</button><button class="btn btn-primary" data-action="save-modal">${I.save} Salvar</button></div>

function toastHtml(){
  if(!S.toast)return"";
  const ok=S.toast.type!=="err";
  const col=ok?"var(--green)":"var(--red)";
  const ico=ok?`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="${ok?"#16A34A":"#DC2626"}" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>`:I.x;
  return`<div class="toast"><span style="color:${col};display:flex">${ico}</span>${esc(S.toast.msg)}</div>`;
}

/* ══ BIND ══ */
function bindAll(){
  document.querySelectorAll("[data-nav]").forEach(e=>e.addEventListener("click",()=>{const t=e.dataset.nav;nav(t,subnavMap[t]?.[0]?.id||t);}));
  document.querySelectorAll("[data-sub]").forEach(e=>e.addEventListener("click",()=>{S.sub=e.dataset.sub;S.modal=null;render();}));
  document.querySelectorAll("[data-close='true']").forEach(e=>e.addEventListener("click",ev=>{if(ev.target===e)closeModal();}));
  document.querySelectorAll("[data-action]").forEach(e=>e.addEventListener("click",()=>handleAction(e.dataset.action,e.dataset.id)));
  document.querySelectorAll("[data-bind]").forEach(e=>{
    const isNum=e.dataset.numtype==="int";
    const h=()=>{S[e.dataset.bind]=isNum?parseInt(e.value):e.value;render();};
    e.addEventListener("input",h);e.addEventListener("change",h);
  });
  const ctProj=document.getElementById("ct_proj");
  if(ctProj){ctProj.addEventListener("change",()=>{const pid=ctProj.value;const ctPat=document.getElementById("ct_pat");if(!ctPat)return;const vins=pid?vinculosDeProjeto(pid):[];ctPat.innerHTML=`<option value="">— Sem patrocinador específico —</option>`+vins.map(v=>`<option value="${esc(v.id)}">${esc(patEmpresa(v))}</option>`).join("");});}
  // Confirmação final de exclusão de projeto (digitar nome)
  const btnDelConf=document.getElementById("btn-del-proj-confirm");
  if(btnDelConf){
    btnDelConf.addEventListener("click",async()=>{
      const confInp=document.getElementById("conf-nome");
      const confErr=document.getElementById("conf-err");
      const nomeEsperado=btnDelConf.dataset.nome;
      const projId=btnDelConf.dataset.id;
      if(!confInp||confInp.value.trim()!==nomeEsperado){
        if(confErr)confErr.style.display="block";
        if(confInp){confInp.style.borderColor="var(--red)";confInp.focus();}
        return;
      }
      // Executar exclusão em cascata
      try{
        btnDelConf.disabled=true;btnDelConf.textContent="Excluindo...";
        // Excluir registros dependentes primeiro
        await sb.from("elaboracao_projetos").delete().eq("projeto_id",projId);
        await sb.from("prestacao_contas").delete().eq("projeto_id",projId);
        await sb.from("reunioes_encerramento").delete().eq("projeto_id",projId);
        await sb.from("contrapartidas").delete().eq("projeto_id",projId);
        await sb.from("relatorios_acompanhamento").delete().eq("projeto_id",projId);
        await sb.from("projeto_patrocinadores").delete().eq("projeto_id",projId);
        // Excluir o projeto
        await delRow("projetos",projId);
        // Atualizar state local
        S.projetos=S.projetos.filter(p=>p.id!==projId);
        S.elaboracao=S.elaboracao.filter(e=>e.projeto_id!==projId);
        S.pc=S.pc.filter(e=>e.projeto_id!==projId);
        S.reunioes=S.reunioes.filter(e=>e.projeto_id!==projId);
        S.contrapartidas=S.contrapartidas.filter(e=>e.projeto_id!==projId);
        S.relatorios=S.relatorios.filter(e=>e.projeto_id!==projId);
        S.patVinculos=S.patVinculos.filter(e=>e.projeto_id!==projId);
        closeModal();
        toast("Projeto excluído permanentemente.");
      }catch(e){
        toast("Erro ao excluir: "+e.message,"err");
        btnDelConf.disabled=false;btnDelConf.textContent="Excluir permanentemente";
      }
    });
  }
}

async function handleAction(action,id){
  if(action==="close-modal"){closeModal();return;}
  if(action==="toggle-dark"){toggleDark();return;}
  if(action==="logout"){doLogout();return;}
  if(action==="clear-filters"){
    // Limpar filtros da página atual
    const page=S.sub;
    if(page==="proj_lista"){S.projSearch="";S.projStatus="";S.projLei="";S.projEquipe="";S.projProponente="";}
    else if(page==="proj_proponentes"){S.propSearch="";S.propEstado="";}
    else if(page==="proj_patrocinadores"){S.patSearch="";}
    else if(page==="rc_relatorios"){S.relSearch="";S.relStatus="";}
    else if(page==="rc_contrapartidas"){S.ctSearch="";S.ctStatus="";}
    else if(page==="rc_reunioes"){S.reunSearch="";S.reunStatus="";}
    else if(page==="pc_main"){S.pcSearch="";S.pcStatusAto="";S.pcStatusPlano="";S.pcConfirmacao="";}
    else if(page==="pc_prazos"){S.prazosEquipe="";}
    else if(page==="elab_main"){S.elSearch="";S.elStatus="";S.elLei="";S.elEquipe="";S.elTipo="";}
    render();return;
  }
  const opens={"novo-projeto":["projeto",{}],"novo-proponente":["proponente",{}],"novo-patrocinador":["patrocinador",{}],"novo-relatorio":["relatorio",{}],"nova-contrapartida":["contrapartida",{}],"nova-reuniao":["reuniao",{}],"novo-pc":["pc",{}],"nova-elaboracao":["elaboracao",{}]};
  if(opens[action]){openModal(...opens[action]);return;}
  if(action==="add-pat-projeto"){openModal("vincular-pat",{projeto_id:id});return;}
  if(action==="ver-projeto"){const d=S.projetos.find(p=>p.id===id);if(d)openModal("detalhe-projeto",d);return;}
  const edits={"edit-projeto":["projetos","projeto"],"edit-proponente":["proponentes","proponente"],"edit-patrocinador":["patrocinadores","patrocinador"],"edit-relatorio":["relatorios","relatorio"],"edit-contrapartida":["contrapartidas","contrapartida"],"edit-reuniao":["reunioes","reuniao"],"edit-pc":["pc","pc"]};
  if(edits[action]){const[arr,tp]=edits[action];const d=S[arr].find(r=>r.id===id);if(d)openModal(tp,{...d});return;}
  if(action==="edit-elaboracao"){const d=S.elaboracao.find(r=>r.id===id);if(d){const p=getProjObj(d.projeto_id);openModal("elaboracao",{...d,...(p?{nome:p.nome,lei:p.lei,estado:p.estado,cidade:p.cidade,proponente_id:p.proponente_id}:{})});}return;}
  // Exclusão de PROJETO — confirmação dupla com nome
  if(action==="del-projeto"){
    const proj=S.projetos.find(p=>p.id===id);
    if(!proj)return;
    const temVinculos=S.patVinculos.filter(v=>v.projeto_id===id).length>0;
    const temPC=S.pc.some(p=>p.projeto_id===id);
    const temElab=S.elaboracao.some(e=>e.projeto_id===id);
    const temRel=S.relatorios.some(r=>r.projeto_id===id);
    const temCt=S.contrapartidas.some(c=>c.projeto_id===id);
    const temReun=S.reunioes.some(r=>r.projeto_id===id);
    const vinculos=[temVinculos&&"patrocinadores vinculados",temPC&&"registro de PC",temElab&&"elaboração",temRel&&"relatórios",temCt&&"contrapartidas",temReun&&"reuniões"].filter(Boolean);
    let aviso="";
    if(vinculos.length>0){aviso=`\n\n⚠ Este projeto possui: ${vinculos.join(", ")}.\nTodos esses registros também serão excluídos.`;}
    const msg=`Tem certeza que deseja excluir o projeto:\n\n"${proj.nome}"?${aviso}\n\nEssa ação não pode ser desfeita.`;
    if(!confirm(msg))return;
    if(!confirm(`Confirmação final: excluir permanentemente "${proj.nome}"?`))return;
    try{
      // Excluir dependências primeiro
      if(temRel)for(const r of S.relatorios.filter(r=>r.projeto_id===id))await delRow("relatorios_acompanhamento",r.id);
      if(temCt)for(const c of S.contrapartidas.filter(c=>c.projeto_id===id))await delRow("contrapartidas",c.id);
      if(temReun)for(const r of S.reunioes.filter(r=>r.projeto_id===id))await delRow("reunioes_encerramento",r.id);
      if(temPC)for(const p of S.pc.filter(p=>p.projeto_id===id))await delRow("prestacao_contas",p.id);
      if(temElab)for(const e of S.elaboracao.filter(e=>e.projeto_id===id))await delRow("elaboracao_projetos",e.id);
      if(temVinculos)for(const v of S.patVinculos.filter(v=>v.projeto_id===id))await delRow("projeto_patrocinadores",v.id);
      // Excluir o projeto
      await delRow("projetos",id);
      // Atualizar state
      S.projetos=S.projetos.filter(p=>p.id!==id);
      S.relatorios=S.relatorios.filter(r=>r.projeto_id!==id);
      S.contrapartidas=S.contrapartidas.filter(c=>c.projeto_id!==id);
      S.reunioes=S.reunioes.filter(r=>r.projeto_id!==id);
      S.pc=S.pc.filter(p=>p.projeto_id!==id);
      S.elaboracao=S.elaboracao.filter(e=>e.projeto_id!==id);
      S.patVinculos=S.patVinculos.filter(v=>v.projeto_id!==id);
      toast("Projeto excluído com sucesso.");render();
    }catch(e){toast("Erro ao excluir: "+e.message,"err");}
    return;
  }
  const dels={"del-relatorio":["relatorios_acompanhamento","relatorios"],"del-contrapartida":["contrapartidas","contrapartidas"],"del-reuniao":["reunioes_encerramento","reunioes"],"del-pc":["prestacao_contas","pc"],"del-elaboracao":["elaboracao_projetos","elaboracao"],"del-proponente":["proponentes","proponentes"],"del-patrocinador":["patrocinadores","patrocinadores"],"del-vinculo":["projeto_patrocinadores","patVinculos"]};
  if(dels[action]){if(!confirm("Confirmar exclusão?"))return;const[tbl,key]=dels[action];try{await delRow(tbl,id);S[key]=S[key].filter(r=>r.id!==id);toast("Excluído.");render();}catch(e){toast("Erro: "+e.message,"err");}return;}
  if(action==="confirmar-del-projeto"){openModal("confirmar-del-projeto",{id});return;}
  if(action==="save-modal"){await saveModal();return;}
}

async function saveModal(){
  const form=document.getElementById("mf");if(!form)return;
  const fd=new FormData(form);
  const type=fd.get("_type"),id=fd.get("_id")||undefined;
  const g=k=>fd.get(k)||null;
  const gn=k=>{const v=fd.get(k);return v&&v!==""?parseFloat(v):null};
  const gi=k=>{const v=fd.get(k);return v&&v!==""?parseInt(v):null};

  // ── VALIDAÇÕES ──
  const erros=[];

  // Validar datas
  ["data_inicio","data_fim","data_prorrogacao","data_prevista_envio","data_envio","data_prevista","prazo_envio","prazo_aditivo","prazo_sem_aditivo","data_envio_ministerio","data_aprovacao_reuniao","data_publicacao_dou","periodo_final_captacao","inicio_execucao"].forEach(campo=>{
    const v=g(campo);
    if(v&&!validarData(v))erros.push(`Data inválida no campo "${campo.replace(/_/g," ")}". Use um ano entre 2000 e 2040.`);
  });
  if(erros.length>0)return toast(erros[0],"err");

  // Validar CNPJ se preenchido
  if(type==="proponente"||type==="patrocinador"){
    const cnpj=g("cnpj");
    if(cnpj&&cnpj.replace(/[^\d]/g,"").length>0&&!validarCNPJ(cnpj))return toast("CNPJ inválido. Verifique o número digitado.","err");
  }

  // Verificar duplicidade
  if(type==="projeto"){
    if(!g("nome"))return toast("Informe o nome do projeto","err");
    if(verificaDuplicidade(S.projetos,"nome",g("nome"),id))return toast(`Já existe um projeto com o nome "${g("nome")}". Verifique antes de cadastrar.`,"err");
  }
  if(type==="proponente"){
    if(!g("razao_social"))return toast("Informe a razão social","err");
    if(verificaDuplicidade(S.proponentes,"razao_social",g("razao_social"),id))return toast(`Proponente "${g("razao_social")}" já está cadastrado.`,"err");
  }
  if(type==="patrocinador"){
    if(!g("empresa"))return toast("Informe o nome da empresa","err");
    if(verificaDuplicidade(S.patrocinadores,"empresa",g("empresa"),id))return toast(`Patrocinador "${g("empresa")}" já está cadastrado.`,"err");
  }

  // ── SALVAR ──
  try{
    if(type==="projeto"){
      const s=await upsert("projetos",{id,nome:g("nome"),proponente_id:g("proponente_id"),lei:g("lei"),ano_inicio:gi("ano_inicio"),estado:g("estado"),cidade:g("cidade"),status:g("status"),equipe_pc:g("equipe_pc"),data_inicio:g("data_inicio"),data_fim:g("data_fim"),data_prorrogacao:g("data_prorrogacao"),observacoes:g("observacoes")});
      S.projetos=id?S.projetos.map(p=>p.id===id?s:p):[...S.projetos,s];
      closeModal();toast(id?"Projeto atualizado!":"Projeto cadastrado!");
    }else if(type==="proponente"){
      const s=await upsert("proponentes",{id,razao_social:g("razao_social"),cnpj:g("cnpj"),estado:g("estado"),cidade:g("cidade"),nome_contato:g("nome_contato"),email:g("email"),telefone:g("telefone"),observacoes:g("observacoes")});
      S.proponentes=id?S.proponentes.map(p=>p.id===id?s:p):[...S.proponentes,s];
      closeModal();toast(id?"Proponente atualizado!":"Proponente cadastrado!");
    }else if(type==="patrocinador"){
      const s=await upsert("patrocinadores",{id,empresa:g("empresa"),cnpj:g("cnpj"),nome_contato:g("nome_contato"),email:g("email"),telefone:g("telefone"),observacoes:g("observacoes")});
      S.patrocinadores=id?S.patrocinadores.map(p=>p.id===id?s:p):[...S.patrocinadores,s];
      closeModal();toast(id?"Patrocinador atualizado!":"Patrocinador cadastrado!");
    }else if(type==="vincular-pat"){
      const projId=g("projeto_id"),patId=g("patrocinador_id");
      if(!patId)return toast("Selecione um patrocinador","err");
      if(S.patVinculos.find(v=>v.projeto_id===projId&&v.patrocinador_id===patId))return toast("Este patrocinador já está vinculado a este projeto","err");
      const res=await sb.from("projeto_patrocinadores").insert({projeto_id:projId,patrocinador_id:patId,tipo_incentivo:g("tipo_incentivo"),tipo_contrato:g("tipo_contrato"),valor_patrocinio:gn("valor_patrocinio"),tipo_monitoramento:g("tipo_monitoramento"),link_monitoramento:g("link_monitoramento"),login_monitoramento:g("login_monitoramento"),senha_monitoramento:g("senha_monitoramento")}).select("*,patrocinadores(id,empresa,nome_contato,email,telefone,cnpj)").single();
      if(res.error)throw res.error;
      S.patVinculos=[...S.patVinculos,res.data];
      closeModal();toast("Patrocinador vinculado!");
    }else if(type==="relatorio"){
      if(!g("projeto_id"))return toast("Selecione o projeto","err");
      const s=await upsert("relatorios_acompanhamento",{id,projeto_id:g("projeto_id"),numero_relatorio:gi("numero_relatorio"),mes_referencia:g("mes_referencia"),data_prevista_envio:g("data_prevista_envio"),data_envio:g("data_envio"),status:g("status")||"Previsto",observacoes:g("observacoes")});
      S.relatorios=id?S.relatorios.map(r=>r.id===id?s:r):[...S.relatorios,s];
      closeModal();toast("Relatório salvo!");
    }else if(type==="contrapartida"){
      if(!g("projeto_id"))return toast("Selecione o projeto","err");
      if(!g("descricao"))return toast("Informe a descrição","err");
      const s=await upsert("contrapartidas",{id,projeto_id:g("projeto_id"),patrocinador_vinculo_id:g("patrocinador_vinculo_id"),descricao:g("descricao"),data_prevista:g("data_prevista"),status:g("status")||"Aguardando",link_relatorio:g("link_relatorio"),observacoes:g("observacoes")});
      S.contrapartidas=id?S.contrapartidas.map(r=>r.id===id?s:r):[...S.contrapartidas,s];
      closeModal();toast("Contrapartida salva!");
    }else if(type==="reuniao"){
      if(!g("projeto_id"))return toast("Selecione o projeto","err");
      const s=await upsert("reunioes_encerramento",{id,projeto_id:g("projeto_id"),nome_contato:g("nome_contato"),contato:g("contato"),status:g("status")||"Agendar",data_agendamento:g("data_agendamento"),observacoes:g("observacoes")});
      S.reunioes=id?S.reunioes.map(r=>r.id===id?s:r):[...S.reunioes,s];
      closeModal();toast("Reunião salva!");
    }else if(type==="pc"){
      if(!g("projeto_id"))return toast("Selecione o projeto","err");
      const existing=S.pc.find(p=>p.projeto_id===g("projeto_id")&&!id);
      const useId=id||(existing&&existing.id)||undefined;
      const s=await upsert("prestacao_contas",{id:useId,projeto_id:g("projeto_id"),mes_inicio:g("mes_inicio"),status_ato:g("status_ato"),status_plano_divulgacao:g("status_plano_divulgacao"),confirmacao_patrocinio:g("confirmacao_patrocinio"),obs_confirmacao:g("obs_confirmacao"),valor_projeto:gn("valor_projeto"),valor_captado:gn("valor_captado"),prazo_envio:g("prazo_envio"),prazo_aditivo:g("prazo_aditivo"),prazo_sem_aditivo:g("prazo_sem_aditivo"),observacoes:g("observacoes")});
      S.pc=useId?S.pc.map(p=>p.id===s.id?s:p):[...S.pc,s];
      closeModal();toast("PC salvo!");
    }else if(type==="elaboracao"){
      let projId=g("projeto_id");
      if(!projId){const existente=g("projeto_id_existente");if(existente){projId=existente;}else{if(!g("nome"))return toast("Informe o nome do projeto ou selecione um existente","err");const pS=await upsert("projetos",{nome:g("nome"),proponente_id:g("proponente_id"),lei:g("lei"),estado:g("estado"),cidade:g("cidade"),status:"Em captação"});S.projetos=[...S.projetos,pS];projId=pS.id;}}
      const s=await upsert("elaboracao_projetos",{id,projeto_id:projId,manifestacao:g("manifestacao"),tipo_novo_renovacao:g("tipo_novo_renovacao"),tipo_pago_cortesia:g("tipo_pago_cortesia"),numero_sli:g("numero_sli"),status_elaboracao:g("status_elaboracao"),data_envio_ministerio:g("data_envio_ministerio"),data_aprovacao_reuniao:g("data_aprovacao_reuniao"),data_publicacao_dou:g("data_publicacao_dou"),periodo_final_captacao:g("periodo_final_captacao"),inicio_execucao:g("inicio_execucao"),valor_autorizado_captacao:gn("valor_autorizado_captacao"),valor_total_captado:gn("valor_total_captado"),valor_faturamento:gn("valor_faturamento"),percentual_captado:gn("percentual_captado"),valor_prestacao_contas:gn("valor_prestacao_contas"),nome_contato:g("nome_contato"),email_contato:g("email_contato"),tel_contato:g("tel_contato"),observacoes:g("observacoes")});
      S.elaboracao=id?S.elaboracao.map(e=>e.id===id?s:e):[...S.elaboracao,s];
      closeModal();toast("Elaboração salva!");
    }
  }catch(e){toast("Erro: "+e.message,"err");}
}
